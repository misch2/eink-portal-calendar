name: Append license notice to release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  append-notice:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Append GPLv3 notice to release body
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id
            });

            const notice = [
              '',
              '---',
              '',
              '> **License notice:** The compiled firmware binary incorporates [GxEPD2](https://github.com/ZinggJM/GxEPD2) (GPLv3) and is therefore distributed under the [GNU General Public License v3](https://www.gnu.org/licenses/gpl-3.0.html).',
              '> Source code is available in this repository.',
            ].join('\n');

            const existingBody = release.data.body ?? '';

            // Avoid appending the notice twice if the workflow is re-run
            if (existingBody.includes('License notice:')) {
              console.log('Notice already present, skipping.');
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: existingBody + notice
            });
