# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build .NET server release artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    # runs-on: ubuntu-latest
    runs-on: [self-hosted, linux, x64]

    defaults:
      run:
        working-directory: ./server/PortalCalendarServer

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
        env:
          DOTNET_CLI_DO_NOT_PROMPT_FOR_WORKLOAD_UPDATE: true
      - name: Restore dependencies
        run: dotnet restore
      - name: Publish (Windows x64)
        run: dotnet publish -c Release -r win-x64 --self-contained false -o publish

      # Optional: single-file EXE
      # run: dotnet publish -c Release -r win-x64 -p:PublishSingleFile=true -p:PublishTrimmed=true -o publish/

      - name: Stamp version in appsettings.json
        run: |
          TAG="${{ github.event.release.tag_name }}"
          REPO="${{ github.repository }}"
          LINK="<a href=\"https://github.com/${REPO}/releases/tag/${TAG}\">${TAG}</a>"
          sed -i "s|{DeployedVersion}|${LINK}|g" publish/appsettings.json

      - name: Create ZIP
        run: cd publish && zip -r ../portal-calendar-server-windows-x64-${{ github.event.release.tag_name }}.zip .

      - name: Move ZIP to repo root
        run: mv portal-calendar-server-windows-x64-${{ github.event.release.tag_name }}.zip ../..

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: portal-calendar-server-windows-x64-${{ github.event.release.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
